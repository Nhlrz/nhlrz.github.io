<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nahel Ruiz — Élève-ingénieur en informatique</title>
  <meta name="description" content="Portfolio de Nahel Ruiz, élève-ingénieur en informatique à l'Institut Galilée et alternant chez Docaposte. Python, Linux, Bash, Docker, C." />
  <meta name="author" content="Nahel Ruiz" />

  <!-- Open Graph (partage social / agents) -->
  <meta property="og:type" content="profile" />
  <meta property="og:title" content="Nahel Ruiz — Élève-ingénieur en informatique" />
  <meta property="og:description" content="Portfolio trilingue (FR / EN / AR) d'un élève-ingénieur en informatique, alternant chez Docaposte." />
  <meta property="profile:first_name" content="Nahel" />
  <meta property="profile:last_name" content="Ruiz" />

  <!--
    Données structurées statiques en JSON-LD (schema.org/Person).
    Présentes dès le chargement, sans JavaScript : c'est la source la plus
    fiable pour les agents/crawlers qui n'exécutent pas le JS.
    Le RDFa (ci-dessous, généré par React) duplique ces infos dans le DOM visible.
  -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Nahel Ruiz",
    "givenName": "Nahel",
    "familyName": "Ruiz",
    "jobTitle": "Élève-ingénieur en informatique",
    "description": "Élève-ingénieur en informatique à l'Institut Galilée, en alternance chez Docaposte. Python, Linux, automatisation et traitement de données.",
    "email": "mailto:nahel.rzh@gmail.com",
    "telephone": "+33769195604",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Saint-Gratien",
      "addressCountry": "FR"
    },
    "knowsLanguage": [
      { "@type": "Language", "name": "French" },
      { "@type": "Language", "name": "English" },
      { "@type": "Language", "name": "Spanish" }
    ],
    "worksFor": {
      "@type": "Organization",
      "name": "Docaposte"
    },
    "hasOccupation": {
      "@type": "Occupation",
      "name": "Software Engineering Apprentice"
    },
    "alumniOf": [
      { "@type": "CollegeOrUniversity", "name": "Institut Galilée" },
      { "@type": "CollegeOrUniversity", "name": "Université Sorbonne Paris Nord" },
      { "@type": "HighSchool", "name": "Lycée Gustave Monod" }
    ],
    "knowsAbout": [
      "Python", "Linux", "Bash", "Docker", "C",
      "Big Data", "Hadoop", "Hive", "Automation", "Containers"
    ]
  }
  </script>

  <!-- Polices : IBM Plex Sans (latin), IBM Plex Mono (utilitaire/data), IBM Plex Sans Arabic -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <!--
    Racine RDFa : typeof="Person" + vocab schema.org.
    React rend ses enfants ici ; les attributs property="..." sur le contenu
    rendu permettent l'extraction sémantique par des agents qui exécutent le JS.
  -->
  <div id="root" vocab="https://schema.org/" typeof="Person">
    <div class="boot">Chargement…</div>
  </div>

  <!-- Repli sans JavaScript : contenu minimal lisible par humains et agents -->
  <noscript>
    <div class="noscript">
      <h1>Nahel Ruiz</h1>
      <p>Élève-ingénieur en informatique à l'Institut Galilée · Alternant chez Docaposte.</p>
      <p>Saint-Gratien, France — <a href="mailto:nahel.rzh@gmail.com">nahel.rzh@gmail.com</a> — +33 7 69 19 56 04</p>
      <p>Compétences : Python, Linux, Bash, Docker, C. Langues : Français, Anglais, Espagnol.</p>
      <p><em>Activez JavaScript pour afficher le portfolio interactif (FR / EN / AR).</em></p>
    </div>
  </noscript>

  <!-- React + Babel via CDN (aucune étape de build) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <script type="text/babel" data-presets="react" src="js/app.jsx"></script>
</body>
</html>
